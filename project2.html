<!DOCTYPE html>
<html lang="en">
<head>

<body class="pt-5">
    <div class="home-btn-wrap">

            <tr>
                <td class="text-center">2</td>
                <td>Budi</td>
                <td>XI IPS</td>
                <td class="text-danger"><strong>Nonaktif</strong></td>
            </tr>
            <tr>
                <td class="text-center">3</td>
                <td>Citra</td>
                <td>XI RPL</td>
                <td class="text-success"><strong>Aktif</strong></td>
            </tr>
        </table>
